<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- 시작: 질문 -->
  <rect x="380" y="70" width="440" height="130" rx="65" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="6"/>
  <text x="600" y="152" text-anchor="middle" font-size="62" font-weight="800" fill="#0b8483">가려워하나요?</text>

  <!-- 분기선 -->
  <g stroke="#94a3b8" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M470 200 Q300 280 300 380"/>
    <path d="M730 200 Q900 280 900 380"/>
  </g>
  <g fill="#94a3b8">
    <polygon points="300,404 284,374 316,374"/>
    <polygon points="900,404 884,374 916,374"/>
  </g>
  <text x="330" y="300" text-anchor="middle" font-size="48" font-weight="800" fill="#0f172a">아니오</text>
  <text x="880" y="300" text-anchor="middle" font-size="48" font-weight="800" fill="#0f172a">예</text>

  <!-- 좌: 시기성 -->
  <rect x="90" y="410" width="420" height="230" rx="24" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="6"/>
  <text x="300" y="510" text-anchor="middle" font-size="56" font-weight="800" fill="#0b8483">시기성 변화</text>
  <text x="300" y="585" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">환경 케어로 관찰</text>

  <!-- 우: 진료 -->
  <rect x="690" y="410" width="420" height="230" rx="24" fill="#fef2f2" stroke="#ef4444" stroke-width="6"/>
  <text x="900" y="510" text-anchor="middle" font-size="56" font-weight="800" fill="#ef4444">피부염 의심</text>
  <text x="900" y="585" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">4주 지속 시 진료</text>

  <text x="1180" y="784" text-anchor="end" font-size="20" fill="#cbd5e1">babyskinlab.com</text>
