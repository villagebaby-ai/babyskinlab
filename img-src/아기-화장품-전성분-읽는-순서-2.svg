  <line x1="180" y1="470" x2="180" y2="530" stroke="#cbd5e1" stroke-width="6" stroke-linecap="round"/>

  <text x="1180" y="784" text-anchor="end" font-size="20" fill="#cbd5e1">babyskinlab.com</text>
