<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Pretendard, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- 성분표 카드 -->
  <rect x="90" y="120" width="720" height="580" rx="24" fill="#ffffff" stroke="#0ea5a4" stroke-width="5"/>
  <rect x="90" y="120" width="720" height="86" rx="24" fill="#e6f7f7"/>
  <rect x="90" y="170" width="720" height="36" fill="#e6f7f7"/>
  <text x="130" y="178" font-size="46" font-weight="800" fill="#0b8483">성분표</text>

  <!-- 일반 행 (회색 라인) -->
  <line x1="130" y1="262" x2="560" y2="262" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>
  <line x1="130" y1="400" x2="500" y2="400" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>
  <line x1="130" y1="538" x2="540" y2="538" stroke="#cbd5e1" stroke-width="14" stroke-linecap="round"/>

  <!-- 주의 행 1: 향료 -->
  <rect x="110" y="300" width="680" height="60" rx="14" fill="#fef3c7"/>
  <circle cx="150" cy="330" r="12" fill="#ef4444"/>
  <text x="770" y="345" text-anchor="end" font-size="40" font-weight="800" fill="#d24d4d">향료</text>

  <!-- 주의 행 2: 색소 -->
  <rect x="110" y="438" width="680" height="60" rx="14" fill="#fef3c7"/>
  <circle cx="150" cy="468" r="12" fill="#ef4444"/>
  <text x="770" y="483" text-anchor="end" font-size="40" font-weight="800" fill="#d24d4d">색소</text>

  <!-- 주의 행 3: 알코올 -->
  <rect x="110" y="576" width="680" height="60" rx="14" fill="#fef3c7"/>
  <circle cx="150" cy="606" r="12" fill="#ef4444"/>
  <text x="770" y="621" text-anchor="end" font-size="40" font-weight="800" fill="#d24d4d">알코올</text>

  <!-- 돋보기 (걸러 읽기) -->
  <circle cx="1000" cy="360" r="120" fill="none" stroke="#0ea5a4" stroke-width="14"/>
  <line x1="1085" y1="445" x2="1150" y2="510" stroke="#0ea5a4" stroke-width="20" stroke-linecap="round"/>
  <text x="1000" y="392" text-anchor="middle" font-size="96" font-weight="800" fill="#0b8483">!</text>
  <text x="1000" y="600" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">걸러 읽기</text>

  <text x="1180" y="784" text-anchor="end" font-size="20" fill="#cbd5e1">babyskinlab.com</text>
</svg>
