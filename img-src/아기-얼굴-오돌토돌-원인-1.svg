  <line x1="408" y1="430" x2="240" y2="430" stroke="#0ea5a4" stroke-width="5" stroke-linecap="round"/>
  <text x="130" y="410" text-anchor="middle" font-size="52" font-weight="800" fill="#0b8483">뺨</text>
  <text x="130" y="470" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">태열</text>

  <!-- 이마 원인 -->
