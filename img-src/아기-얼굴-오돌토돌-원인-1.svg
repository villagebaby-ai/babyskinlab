<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Pretendard, 'Apple SD Gothic Neo', sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- 얼굴 -->
  <circle cx="600" cy="400" r="270" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="6"/>
  <!-- 눈 -->
  <circle cx="510" cy="350" r="14" fill="#0f172a"/>
  <circle cx="690" cy="350" r="14" fill="#0f172a"/>
  <!-- 입 -->
  <path d="M550 500 Q600 540 650 500" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>

  <!-- 이마 포인트 -->
  <circle cx="600" cy="240" r="22" fill="#f59e0b"/>
  <line x1="600" y1="218" x2="600" y2="130" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
  <text x="600" y="96" text-anchor="middle" font-size="52" font-weight="800" fill="#92400e">이마</text>

  <!-- 뺨 포인트 (좌) -->
