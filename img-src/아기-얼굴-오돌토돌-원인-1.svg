  <line x1="622" y1="240" x2="790" y2="200" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>

  <!-- 입가 포인트 -->
  <circle cx="680" cy="540" r="22" fill="#ef4444"/>
  <line x1="702" y1="540" x2="890" y2="590" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <text x="990" y="580" text-anchor="middle" font-size="52" font-weight="800" fill="#ef4444">입가</text>
  <text x="990" y="640" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">침독</text>

  <text x="1180" y="784" text-anchor="end" font-size="20" fill="#cbd5e1">babyskinlab.com</text>
