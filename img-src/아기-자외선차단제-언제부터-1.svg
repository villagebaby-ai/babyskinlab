<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Pretendard, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- 좌: 0–6개월 -->
  <rect x="60" y="140" width="490" height="380" rx="24" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="5"/>
  <text x="305" y="235" text-anchor="middle" font-size="54" font-weight="800" fill="#0b8483">0–6개월</text>
  <text x="305" y="330" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">차단제 대신</text>
  <text x="305" y="440" text-anchor="middle" font-size="60" font-weight="800" fill="#0f172a">그늘·옷·모자</text>

  <!-- 우: 6개월 이후 -->
  <rect x="650" y="140" width="490" height="380" rx="24" fill="#f0fbfb" stroke="#0ea5a4" stroke-width="5"/>
  <text x="895" y="235" text-anchor="middle" font-size="54" font-weight="800" fill="#0b8483">6개월 이후</text>
  <text x="895" y="330" text-anchor="middle" font-size="42" font-weight="700" fill="#64748b">얼굴·손등만</text>
  <text x="895" y="440" text-anchor="middle" font-size="60" font-weight="800" fill="#0f172a">미네랄 차단제</text>

  <!-- 이유 밴드 -->
  <rect x="60" y="590" width="1080" height="150" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <text x="320" y="690" text-anchor="middle" font-size="52" font-weight="800" fill="#0f172a">얇은 피부</text>
  <text x="600" y="688" text-anchor="middle" font-size="56" font-weight="800" fill="#0ea5a4">·</text>
  <text x="880" y="690" text-anchor="middle" font-size="52" font-weight="800" fill="#0f172a">높은 흡수</text>

  <text x="1180" y="784" text-anchor="end" font-size="20" fill="#cbd5e1">babyskinlab.com</text>
</svg>
