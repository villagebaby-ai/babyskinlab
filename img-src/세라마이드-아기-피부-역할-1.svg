<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Pretendard, sans-serif">
  <rect width="1200" height="800" fill="#ffffff"/>

  <!-- 왼쪽: 세라마이드 충분 -->
  <rect x="70" y="90" width="500" height="650" rx="24" fill="#f0fbfb" stroke="#0ea5a4" stroke-width="5"/>
  <text x="320" y="180" text-anchor="middle" font-size="52" font-weight="800" fill="#0b8483">세라마이드 충분</text>

  <!-- 물방울 (잠김) -->
  <path d="M320 250 C 285 300 268 325 268 350 a52 52 0 0 0 104 0 c0 -25 -17 -50 -52 -100 Z" fill="#0ea5a4"/>
  <text x="320" y="470" text-anchor="middle" font-size="46" font-weight="800" fill="#0f172a">수분 지킴</text>

  <!-- 벽돌 + 시멘트 -->
  <rect x="100" y="600" width="440" height="24" fill="#0b8483"/>
  <rect x="238" y="510" width="20" height="90" fill="#0b8483"/>
  <rect x="386" y="510" width="20" height="90" fill="#0b8483"/>
  <rect x="108" y="510" width="130" height="90" rx="12" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="4"/>
  <rect x="258" y="510" width="128" height="90" rx="12" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="4"/>
  <rect x="406" y="510" width="134" height="90" rx="12" fill="#e6f7f7" stroke="#0ea5a4" stroke-width="4"/>

  <!-- 오른쪽: 세라마이드 부족 -->
  <rect x="630" y="90" width="500" height="650" rx="24" fill="#fff5f5" stroke="#f08a8a" stroke-width="5"/>
  <text x="880" y="180" text-anchor="middle" font-size="52" font-weight="800" fill="#d24d4d">세라마이드 부족</text>

  <!-- 새어나가는 물방울 (위로) -->
  <path d="M760 300 C 738 332 728 348 728 364 a32 32 0 0 0 64 0 c0 -16 -10 -32 -32 -64 Z" fill="#ef4444"/>
  <path d="M980 280 C 962 308 954 322 954 336 a28 28 0 0 0 56 0 c0 -14 -8 -28 -28 -56 Z" fill="#ef4444"/>
  <text x="880" y="470" text-anchor="middle" font-size="46" font-weight="800" fill="#d24d4d">수분 샘</text>

  <!-- 틈 벌어진 벽돌 (시멘트 없음) -->
  <rect x="668" y="510" width="110" height="90" rx="12" fill="#ffffff" stroke="#f08a8a" stroke-width="4"/>
  <rect x="833" y="510" width="110" height="90" rx="12" fill="#ffffff" stroke="#f08a8a" stroke-width="4"/>
  <rect x="998" y="510" width="110" height="90" rx="12" fill="#ffffff" stroke="#f08a8a" stroke-width="4"/>
  <path d="M805 596 v-80 M970 596 v-80" stroke="#ef4444" stroke-width="5" stroke-dasharray="10 12" stroke-linecap="round"/>

  <text x="1180" y="784" text-anchor="end" font-size="20" fill="#cbd5e1">babyskinlab.com</text>
</svg>
